services:
  - type: web
    name: plinkovibe-backend
    env: node
    rootDir: .
    buildCommand: npm install --include=dev && npm run build --workspace=backend
    startCommand: npm run start --workspace=backend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: BEHIND_TLS_PROXY
        value: "true"
      - key: CORS_ORIGINS
        sync: false  # Set this manually in the Render dashboard to your frontend URL (e.g. https://your-app.pages.dev)
    healthCheckPath: /api/health

